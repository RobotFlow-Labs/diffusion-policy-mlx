# PushT Diffusion Policy (CNN/UNet) -- Default Configuration
#
# Matches the upstream PushT image diffusion policy settings.
# Used with: python -m diffusion_policy_mlx.training.train_diffusion --config configs/pusht_diffusion_policy_cnn.yaml

# -- Data ------------------------------------------------------------------
dataset_path: data/pusht_image.zarr
horizon: 16
n_obs_steps: 2
n_action_steps: 8

# -- Model -----------------------------------------------------------------
down_dims: [256, 512, 1024]
kernel_size: 5
n_groups: 8
diffusion_step_embed_dim: 256
num_train_timesteps: 100
num_inference_steps: 100
crop_shape: [76, 76]

# -- Training --------------------------------------------------------------
batch_size: 64
num_epochs: 300
lr: 1.0e-4
weight_decay: 1.0e-6
lr_scheduler: cosine
lr_warmup_steps: 500
ema_power: 0.75
seed: 42

# -- Checkpointing ---------------------------------------------------------
checkpoint_dir: checkpoints
save_every_n_epochs: 50
top_k: 5

# -- Logging ---------------------------------------------------------------
log_every_n_steps: 100
use_wandb: false
wandb_project: diffusion-policy-mlx
